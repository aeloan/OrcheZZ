<!DOCTYPE html>
<html>
<head>
    <title>Orchezz</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='base.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>

    <script>
        function getOrCreateToken() {
            let token = sessionStorage.getItem("user_token");
            if (!token) {
                token = Math.random().toString(36).substring(2, 12);
                sessionStorage.setItem("user_token", token);
            }
            return token;
        }

        // Créer le socket immédiatement si pas déjà connecté
        if (typeof socket === 'undefined' || !socket || socket.disconnected) {
            const token = getOrCreateToken();
            var socket = io.connect("/", { query: { token } });

            socket.on("timeout", () => {
                alert("Déconnecté pour inactivité");
            });

            socket.on("invalidate_token", () => {
                sessionStorage.removeItem("user_token");
                window.location.href = "/";
            });
        }
    </script>
</head>
<body>

{% block content %}{% endblock %}

<script>
function startRecording() {
    navigator.mediaDevices.getUserMedia({ audio: true })
    .then(stream => {
        const mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
        const chunks = [];

        mediaRecorder.ondataavailable = function(e) {
            if (e.data.size > 0) {
                chunks.push(e.data);
            }
        };

        mediaRecorder.onstop = function() {
            // Créer un Blob avec tout l'audio
            const audioBlob = new Blob(chunks, { type: 'audio/webm' });

            // Lire en ArrayBuffer pour envoyer en bytes
            const reader = new FileReader();
            reader.onload = function() {
                const buffer = reader.result;
                const bytes = Array.from(new Uint8Array(buffer));

                // Envoyer via Socket.IO
                socket.emit("audio_chunk", bytes);
            };
            reader.readAsArrayBuffer(audioBlob);
        };

        // Démarre l'enregistrement
        mediaRecorder.start();

        // Arrête automatiquement après 10 secondes
        setTimeout(() => {
            mediaRecorder.stop();
        }, 10000);
    })
    .catch(err => console.error("Erreur accès micro :", err));
}

startRecording()




</script>

</body>
</html>
