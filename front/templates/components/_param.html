{% macro param(label, icone, code) %}

<div class="flex-col ai-center player-card margin-small padding-medium
    jc-between p-2 bg-dark rounded gap-2">
    <div class="flex-col ai-center jc-center gap-1">
        {% if est_host %}
            <img src="{{ url_for('static', filename='image/.svg') }}"
                style="width: 48px; height: 48px;">
        {% else %}
            <img src="{{ url_for('static', filename='image/.svg') }}"
                style="width: 48px; height: 48px;">
        {% endif %}

        <span class="text-white">{{ pseudo }}</span>
        <span class="{{ 'text-green' if est_pret else 'text-red' }}">
            {{ "Prêt" if est_pret else "En attente..." }}
        </span>
    </div>
</div>

{% endmacro %}
